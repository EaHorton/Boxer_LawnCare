{{ define "main" }}
<div class="container my-5">
    <div class="content-section">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="section-title text-center mb-3" style="color: #8B0000;">Get an Instant Quote</h2>
                <p class="text-center text-muted mb-4">Fill out the form below and we'll provide you with a customized quote for your lawn care needs.</p>
                <div class="row">
                    <div class="col-md-8 mx-auto">
                        <form action="/.netlify/functions/submit-quote" method="POST" data-netlify="false">
                            <input type="hidden" name="form-type" value="instant-quote">
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="name" class="form-label">Name *</label>
                                    <input type="text" class="form-control" id="name" name="name" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="address" class="form-label">Service Address *</label>
                                    <input type="text" class="form-control" id="address" name="address" required>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="email" class="form-label">Email *</label>
                                    <input type="email" class="form-control" id="email" name="email" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="phone" class="form-label">Phone Number *</label>
                                    <input type="tel" class="form-control" id="phone" name="phone" required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="lawn_size" class="form-label">Estimated Lawn Size *</label>
                                <select class="form-control" id="lawn_size" name="lawn_size" required>
                                    <option value="">Select size...</option>
                                    <option value="small">Small Lawn (Up to 5.5k sqft)</option>
                                    <option value="medium">Medium Lawn (5.5k - 10k sqft)</option>
                                    <option value="large">Large Lawn (10k - 15k sqft)</option>
                                    <option value="xlarge">Extra Large Lawn (15k - 25k sqft)</option>
                                </select>
                            </div>
                            
                            <div class="text-center">
                                <button type="submit" class="btn btn-primary btn-lg" style="background-color: #A52A2A; border-color: #A52A2A;">
                                    <i class="fas fa-paper-plane me-2"></i>Request Quote
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Form handling
(function () {
    'use strict'
    var form = document.querySelector('form')
    
    form.addEventListener('submit', async function (event) {
        event.preventDefault()
        event.stopPropagation()
        
        if (!form.checkValidity()) {
            form.classList.add('was-validated')
            return
        }
        
        // Get form data
        const formData = new FormData(form)
        const button = form.querySelector('button[type="submit"]')
        const originalButtonText = button.innerHTML
        
        // Disable button and show loading state
        button.disabled = true
        button.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Sending...'
        
        try {
            // Submit form data
            const response = await fetch('/.netlify/functions/submit-quote', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: new URLSearchParams(formData).toString()
            })
            
            if (response.ok || response.status === 303) {
                // Redirect to thank you page
                window.location.href = '/quote-thank-you/'
            } else {
                const error = await response.json()
                console.error('Form submission error:', error)
                alert('There was an error submitting your request. Please try again or call us directly.')
                button.disabled = false
                button.innerHTML = originalButtonText
            }
        } catch (error) {
            console.error('Network error:', error)
            alert('There was an error submitting your request. Please check your connection and try again.')
            button.disabled = false
            button.innerHTML = originalButtonText
        }
    }, false)
})()
</script>
{{ end }}
